<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Keith Chernek">
  <meta property="og:title" content="Portfolio — Keith Chernek">
  <meta property="og:description" content="Commercial and editorial photography portfolio by Keith Chernek. Swimwear, studio editorial, and black and white portrait work based in Dallas–Fort Worth.">
  <meta property="og:url" content="https://kchernek.com/portfolio.html">
  <meta property="og:image" content="https://kchernek.com/portfolio-images/share/og-default-1200x630.jpg">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Portfolio — Keith Chernek">
  <meta name="twitter:description" content="Commercial and editorial photography portfolio by Keith Chernek. Swimwear, studio editorial, and black and white portrait work based in Dallas–Fort Worth.">
  <meta name="twitter:image" content="https://kchernek.com/portfolio-images/share/og-default-1200x630.jpg">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "ImageGallery",
    "name": "Keith Chernek Photography Portfolio",
    "description": "Commercial fashion and lifestyle photography portfolio by Keith Chernek, DFW.",
    "url": "https://kchernek.com/portfolio.html",
    "author": {
      "@type": "Person",
      "name": "Keith Chernek",
      "url": "https://kchernek.com"
    }
  }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    .category-link {
      display: block;
      text-decoration: none;
      color: inherit;
    }

    /* ── Overflow wrapper clips image on hover scale ── */
    .category-thumb {
      display: block;
      overflow: hidden;
      aspect-ratio: 3 / 4;
      background-color: var(--text-muted);
    }

    /* Lead shoot: landscape crop for campaign-page presence */
    .category-thumb--wide {
      aspect-ratio: 3 / 2;
    }

    .category-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
      transition: transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .category-link:hover .category-thumb img {
      will-change: transform;
      transform: scale(1.04);
    }

    .category-link:focus-visible .category-thumb {
      outline: 2px solid var(--secondary-navy);
      outline-offset: 3px;
    }

    .category-label {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-primary);
      margin-top: 16px;
    }

    .category-count {
      font-size: 0.72rem;
      font-weight: 400;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* ── Lead shoot: full-width ── */
    .portfolio-lead {
      display: block;
      margin-bottom: 32px;
    }

    /* ── Supporting shoots: 3-column ── */
    .category-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }

    /* ── Mobile ── */
    @media (max-width: 640px) {
      .portfolio-lead { margin-bottom: 40px; }
      .category-grid { grid-template-columns: 1fr; gap: 40px; }
    }

    /* ── Tablet: 3-col still works, but tighten gap ── */
    @media (max-width: 768px) and (min-width: 641px) {
      .category-grid { gap: 16px; }
    }
  </style>
</head>
<body>

  <header class="site-header" id="siteHeader"></header>

  <main class="page-wrap">

    <div class="page-header">
      <h1 class="page-title">Portfolio</h1>
    </div>

    <!-- Lead shoot — rotate to newest / strongest work as portfolio grows -->
    <a href="portfolio/cowgirl-swimwear.html" class="portfolio-lead category-link">
      <div class="category-thumb category-thumb--wide">
        <img
          src="portfolio-images/Cowgirl-Swimwear/cowgirl-swimwear-los-angeles-california-heloise-01.jpg"
          alt="Cowgirl swimwear editorial by Keith Chernek, Los Angeles"
          fetchpriority="high"
          width="2160" height="2880"
        >
      </div>
      <p class="category-label">Cowgirl Swimwear</p>
      <p class="category-count">Los Angeles, 2026</p>
    </a>

    <!-- Supporting shoots -->
    <div class="category-grid">

      <a href="portfolio/editorial.html" class="category-link">
        <div class="category-thumb">
          <img
            src="portfolio-images/Editorial_Studio/editorial-studio-los-angeles-california-julia-01.jpg"
            alt="Studio editorial photography by Keith Chernek, Los Angeles"
            loading="lazy"
            width="2025" height="2700"
          >
        </div>
        <p class="category-label">Editorial</p>
        <p class="category-count">Los Angeles, 2025</p>
      </a>

      <a href="portfolio/studio-black-white.html" class="category-link">
        <div class="category-thumb">
          <img
            src="portfolio-images/Studio_Black_White/studio-editorial-black-white-dallas-texas-kalie-01.jpg"
            alt="Black and white studio editorial portrait by Keith Chernek, Dallas"
            loading="lazy"
            width="2160" height="2700"
          >
        </div>
        <p class="category-label">Black &amp; White</p>
        <p class="category-count">Dallas, 2025</p>
      </a>

      <a href="portfolio/swimwear.html" class="category-link">
        <div class="category-thumb">
          <img
            src="portfolio-images/Flower-Swimwear/swimwear-poolside-dallas-texas-lauren-11.jpg"
            alt="Swimwear editorial photography by Keith Chernek, Dallas"
            loading="lazy"
            width="2160" height="2700"
          >
        </div>
        <p class="category-label">Swimwear</p>
        <p class="category-count">Dallas, 2024</p>
      </a>

    </div>

    <div class="page-cta page-cta--centered">
      <p class="cta-prompt">Want work like this?</p>
      <a href="book-a-shoot/model-development.html" class="btn-primary">Book a Shoot &#8594;</a>
    </div>

  </main>

  <footer data-component="footer"></footer>

  <script src="/components/nav.js"></script>
  <script src="/components/motion.js"></script>
  <script src="/components/footer.js"></script>
  <script>
    document.querySelectorAll('.category-thumb img').forEach(function (img) {
      img.addEventListener('transitionend', function () {
        img.style.willChange = 'auto';
      });
    });
  </script>
</body>
</html>
