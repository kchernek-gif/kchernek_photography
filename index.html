  <style>
    .hero {
      width: 100%;
      height: 85vh;
      min-height: 520px;
      position: relative;
      overflow: hidden;
    }

    .hero-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
    }

    .hero-links {
      position: absolute;
      bottom: 40px;
      left: 40px;
      right: 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .hero-cta {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #fff;
      text-decoration: none;
      border-bottom: 1px solid rgba(255, 255, 255, 0.5);
      padding: 14px 0;
      white-space: nowrap;
      transition: border-color 0.15s var(--ease-out);
    }

    .hero-cta:hover        { border-color: #fff; }
    .hero-cta:focus-visible {
      outline: 2px solid #fff;
      outline-offset: 4px;
    }

    footer { margin-top: 0; }

    @media (max-width: 640px) {
      .hero { height: 65vh; }
      .hero-links { left: 20px; right: 20px; bottom: 28px; }
      .hero-cta { min-height: 44px; display: inline-flex; align-items: center; padding: 0; }
    }
  </style>
</head>
<body>

  <header class="site-header" id="siteHeader"></header>

  <!-- Hero — placeholder; swap for final selected hero before any client-facing use -->
  <main>

  <section class="hero" aria-label="Hero">
    <picture>
      <source

        sizes="100vw"
      >
      <source
        type="image/jpeg"
        srcset="portfolio-images/hero/2024-alexia-los-angeles-golden-hour-hero-1200w.jpg 1200w,
                portfolio-images/hero/2024-alexia-los-angeles-golden-hour-hero-1800w.jpg 1800w,
                portfolio-images/hero/2024-alexia-los-angeles-golden-hour-hero-2400w.jpg 2400w"
        sizes="100vw"
      >

        src="portfolio-images/hero/2024-alexia-los-angeles-golden-hour-hero-2400w.jpg"
        alt="Model in black swimwear at golden hour overlooking Los Angeles skyline, commercial fashion campaign"
        class="hero-img"
        width="2880"
        height="1920"
        fetchpriority="high"
      >
    </picture>
    <div class="hero-links">
      <a href="portfolio.html" class="hero-cta">View Portfolio &#8594;</a>
      <a href="book-a-shoot/model-development.html" class="hero-cta">Book a Shoot &#8594;</a>
    </div>
  </section>
