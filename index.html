  <link rel="stylesheet" href="styles.css">
  <style>
    .hero {
      width: 100%;
      height: 85vh;
      min-height: 520px;
      position: relative;
      overflow: hidden;
    }

    .hero-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
    }

    .hero-cta {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #fff;
      text-decoration: none;
      border-bottom: 1px solid rgba(255, 255, 255, 0.5);
      padding: 14px 0;
      white-space: nowrap;
      transition: border-color 0.2s ease;
    }

    .hero-cta:hover        { border-color: #fff; }
    .hero-cta:focus-visible {
      outline: 2px solid #fff;
      outline-offset: 4px;
    }

    /* No gap between hero and home-cta, or home-cta and footer */
    .home-cta {
      text-align: center;
      padding: 60px 4vw;
      border-top: 1px solid var(--border);
    }

    footer { margin-top: 0; }

    @media (max-width: 640px) {
      .hero { height: 65vh; }
    }
  </style>
</head>
<body>

  <header class="site-header" id="siteHeader"></header>

  <!-- Hero — placeholder; swap for final selected hero before any client-facing use -->
  <section class="hero" aria-label="Hero">
    <img
      src="portfolio-images/EmptyName_3.jpg"
      alt="Editorial portrait by Keith Chernek, DFW"
      class="hero-img"
    >
    <a href="portfolio.html" class="hero-cta">View Portfolio &#8594;</a>
  </section>

  <section class="home-cta">
    <a href="book-a-shoot/model-development.html" class="btn-primary">Book a Shoot &#8594;</a>
  </section>

  <footer data-component="footer"></footer>

  <script src="/components/nav.js"></script>
  <script src="/components/motion.js"></script>
  <script src="/components/footer.js"></script>
</body>
</html>
